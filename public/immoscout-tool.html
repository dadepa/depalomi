<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImmoScout Export — Depalomi.com</title>
  <meta name="description" content="Internes ImmoScout Browser-Import-Tool für Excel-Listen." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <div data-site-nav></div>

  <main class="tool-page">
    <section class="tool-shell">
      <div class="tool-heading">
        <p class="label">Internes Tool</p>
        <h1>ImmoScout Export</h1>
        <p>Excel-Datei aus Browser-Captures.</p>
      </div>

      <div class="tool-auth" id="immoscoutAuth" hidden>
        <div>
          <strong>Tool-Login erforderlich</strong>
          <span>Dieses Tool ist nur für freigeschaltete Profile verfügbar.</span>
        </div>
        <form class="tool-auth-form" id="immoscoutLoginForm">
          <input class="tool-auth-input" id="immoscoutUsername" autocomplete="username" placeholder="Benutzername" />
          <input class="tool-auth-input" id="immoscoutPassword" type="password" autocomplete="current-password" placeholder="Passwort" />
          <button class="btn btn-navy" type="submit" id="immoscoutLoginButton">Einloggen</button>
          <span class="tool-auth-message" id="immoscoutAuthMessage"></span>
        </form>
      </div>

      <section class="export-tool capture-tool" id="immoscoutCaptureTool" hidden>
        <div class="tool-subhead">
          <div>
            <p class="label">Browser-Import</p>
            <h2>Captures sammeln</h2>
            <p class="tool-profile-line" id="immoscoutProfileLine"></p>
          </div>
        </div>

        <div class="tool-actions">
          <button class="btn btn-navy" type="button" id="immoscoutCopyBookmarklet">ImmoScout speichern kopieren</button>
          <button class="btn btn-primary" type="button" id="immoscoutExportCaptures">Captures exportieren</button>
          <button class="btn btn-outline" type="button" id="immoscoutRefreshCaptures">Aktualisieren</button>
          <button class="btn btn-outline" type="button" id="immoscoutClearCaptures">Leeren</button>
          <button class="btn btn-outline" type="button" id="immoscoutLogout">Abmelden</button>
        </div>

        <div class="status-table-wrap capture-table-wrap">
          <table class="status-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Titel</th>
                <th>Text</th>
                <th>Aktualisiert</th>
                <th>Quelltext</th>
              </tr>
            </thead>
            <tbody id="immoscoutCaptures"></tbody>
          </table>
        </div>

        <section class="source-preview" id="immoscoutSourcePreview" hidden>
          <div class="source-preview-head">
            <div>
              <p class="label">Quelltext</p>
              <h3 id="immoscoutSourceTitle">Capture</h3>
            </div>
            <div class="source-preview-actions">
              <button class="btn btn-outline" type="button" id="immoscoutCopySource">Kopieren</button>
              <button class="btn btn-outline" type="button" id="immoscoutCloseSource">Schließen</button>
            </div>
          </div>
          <textarea id="immoscoutSourceText" readonly spellcheck="false"></textarea>
        </section>
      </section>

      <section class="export-status" id="immoscoutStatus" aria-live="polite" hidden>
        <div class="export-status-head">
          <div>
            <p class="label">Status</p>
            <h2 id="immoscoutStatusTitle">Bereit</h2>
          </div>
          <a class="btn btn-navy" id="immoscoutDownload" href="#" hidden>Excel herunterladen</a>
        </div>
        <div class="status-table-wrap">
          <table class="status-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Daten</th>
                <th>Meldung</th>
              </tr>
            </thead>
            <tbody id="immoscoutResults"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <div data-site-footer></div>

  <script src="/script.js"></script>
  <script src="/immoscout-tool.js"></script>
</body>
</html>
