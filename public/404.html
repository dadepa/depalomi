<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Seite nicht gefunden · Depalomi.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: calc(var(--nav-h) + 4rem) clamp(1.5rem, 4vw, 4rem) 4rem;
      border-bottom: 1px solid var(--border);
    }

    .four04-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 2rem;
    }

    .four04-num {
      font-size: clamp(8rem, 22vw, 18rem);
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 0.85;
      color: var(--surface-2);
      user-select: none;
      position: relative;
    }

    .four04-num::after {
      content: '404';
      position: absolute;
      inset: 0;
      color: transparent;
      -webkit-text-stroke: 1px var(--border);
    }

    .four04-label {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .four04-label::before {
      content: '';
      display: block;
      width: 24px;
      height: 2px;
      background: var(--amber);
    }

    .four04-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 3rem;
      flex-wrap: wrap;
      padding-top: 4rem;
    }

    .four04-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      line-height: 0.95;
      color: var(--navy);
      margin-bottom: 1.5rem;
    }

    .four04-desc {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.75;
      max-width: 400px;
      margin-bottom: 2.5rem;
    }

    .four04-links {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .four04-link {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 1rem 1.5rem;
      border-right: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .four04-link:last-child { border-right: none; }

    .four04-link:hover {
      color: var(--navy);
      background: var(--surface);
    }

    .four04-link svg { flex-shrink: 0; transition: transform 0.2s; }
    .four04-link:hover svg { transform: translateX(3px); }

    .four04-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1rem;
    }

    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 1rem 2rem;
      background: var(--navy);
      color: #fff;
      border: 1px solid var(--navy);
      transition: background 0.2s, border-color 0.2s;
    }

    .back-home:hover {
      background: var(--amber);
      border-color: var(--amber);
    }

    .back-home svg { flex-shrink: 0; }

    @media (max-width: 600px) {
      .four04-bottom { flex-direction: column; align-items: flex-start; }
      .four04-actions { align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div data-site-nav></div>

  <div class="page-404">
    <div class="four04-top">
      <div class="four04-num">404</div>
    </div>

    <div class="four04-bottom">
      <div>
        <div class="four04-label">
          <span class="label">Seite nicht gefunden</span>
        </div>
        <h1 class="four04-title">Diese Seite<br>existiert nicht.</h1>
        <p class="four04-desc">
          Die gesuchte Seite wurde möglicherweise verschoben, umbenannt oder existiert nicht mehr.
        </p>
        <div class="four04-links">
          <a href="/fotografie/" class="four04-link">
            Fotografie
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M2.5 7h9M8 3.5l3.5 3.5L8 10.5"/>
            </svg>
          </a>
          <a href="/video/" class="four04-link">
            Video
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M2.5 7h9M8 3.5l3.5 3.5L8 10.5"/>
            </svg>
          </a>
          <a href="/webseiten/" class="four04-link">
            Web
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M2.5 7h9M8 3.5l3.5 3.5L8 10.5"/>
            </svg>
          </a>
          <a href="/automatisierung/" class="four04-link">
            Automatisierung
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M2.5 7h9M8 3.5l3.5 3.5L8 10.5"/>
            </svg>
          </a>
        </div>
      </div>

      <div class="four04-actions">
        <a href="/" class="back-home">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M13 8H3M7 4l-4 4 4 4"/>
          </svg>
          Zur Startseite
        </a>
        <a href="mailto:info@depalomi.com" class="btn btn-outline" style="background:transparent;color:var(--navy);border:1px solid var(--border);padding:.75rem 1.5rem;font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;display:inline-flex;align-items:center;gap:.5rem;transition:border-color .2s">
          Kontakt aufnehmen
        </a>
      </div>
    </div>
  </div>

  <div data-site-footer></div>

  <script src="/script.js"></script>
</body>
</html>
